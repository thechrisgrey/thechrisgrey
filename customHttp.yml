# AWS Amplify Hosting — custom HTTP response headers.
#
# WHY THIS FILE EXISTS
# Amplify Hosting applies custom headers from THIS file (customHttp.yml at the repo
# root) or the console "Custom headers" section — NOT from a `customHeaders:` block
# inside amplify.yml / the build spec, which AWS has deprecated and no longer
# applies. Headers were previously declared only in amplify.yml, so production
# served NONE of them: verified 2026-06 that thechrisgrey.com (and the Amplify
# default domain) returned no CSP/HSTS/X-Frame-Options/etc., and that even the
# cache-control rules were ignored (a hashed .js asset did not carry
# `immutable`). Moving them here is the documented fix:
# https://docs.aws.amazon.com/amplify/latest/userguide/migrate-custom-headers.html
# https://docs.aws.amazon.com/amplify/latest/userguide/custom-header-YAML-format.html
#
# REDEPLOY REQUIRED: custom headers are applied at deploy time. After merging,
# trigger an Amplify release for `main`, then verify with:
#   curl -sI https://thechrisgrey.com/ | grep -i 'content-security\|strict-transport\|x-frame'
#
# CSP ROLLOUT — REPORT-ONLY FIRST
# The CSP has never been enforced on the live site, so it ships as
# `Content-Security-Policy-Report-Only`: browsers REPORT violations to the
# report-uri (the metrics Lambda /csp-report endpoint) without blocking anything.
# Watch those reports for a clean window, fix any missing origin, THEN enforce by
# renaming the key to `Content-Security-Policy` (drop `-Report-Only`). All the
# other security headers are safe and are enforced immediately.

customHeaders:
  - pattern: '**/*'
    headers:
      - key: 'Strict-Transport-Security'
        value: 'max-age=31536000; includeSubDomains'
      - key: 'X-Content-Type-Options'
        value: 'nosniff'
      - key: 'X-Frame-Options'
        value: 'SAMEORIGIN'
      - key: 'Referrer-Policy'
        value: 'strict-origin-when-cross-origin'
      - key: 'Permissions-Policy'
        value: 'camera=(), microphone=(), geolocation=()'
      # REPORT-ONLY: logs violations, blocks nothing. Rename to
      # 'Content-Security-Policy' to enforce once the report-uri is quiet.
      # style-src/font-src allow fonts.googleapis.com / fonts.gstatic.com for
      # Material Icons (loaded in index.html); 'unsafe-inline' is retained because
      # the app uses inline styles (typography.ts, GSAP/Lenis) and a nonce can't be
      # injected by static hosting — tighten that in a later report-only pass.
      - key: 'Content-Security-Policy-Report-Only'
        value: "default-src 'self'; script-src 'self' https://static.cloudflareinsights.com https://plausible.io https://challenges.cloudflare.com https://us-assets.i.posthog.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://cdn.sanity.io https://i.ytimg.com; connect-src 'self' https://cloudflareinsights.com https://plausible.io https://vrs4egsi745nep54y6abvwlcwq0smqak.lambda-url.us-east-2.on.aws https://sf5bejshafrb6t7zbbfw5knu7a0axlyp.lambda-url.us-east-2.on.aws https://mrrpf6f34n7vpkolurdc24c5fu0jruad.lambda-url.us-east-1.on.aws https://*.sanity.io https://*.apicdn.sanity.io https://zk46cokyuwgtdtz2ocdlhtjcji0fnidk.lambda-url.us-east-1.on.aws https://dnsio2ypcuxamxgzjpxr7knwpe0ybbuq.lambda-url.us-east-1.on.aws https://b6u7jlyktwv7wtseebhl45lv4y0byxnl.lambda-url.us-east-1.on.aws https://cognito-idp.us-east-1.amazonaws.com https://challenges.cloudflare.com https://fx6pbx5hkhyrccf6c7pqk6x5fq0idpiv.lambda-url.us-east-1.on.aws https://us.i.posthog.com https://us-assets.i.posthog.com; frame-src https://www.youtube.com https://open.spotify.com https://www.buzzsprout.com https://challenges.cloudflare.com; base-uri 'self'; form-action 'self'; frame-ancestors 'self'; worker-src 'self' blob:; object-src 'none'; upgrade-insecure-requests; report-uri https://dnsio2ypcuxamxgzjpxr7knwpe0ybbuq.lambda-url.us-east-1.on.aws/csp-report"
  # --- Caching (also previously ignored in amplify.yml; restored here) ----------
  - pattern: '**/*.js'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=31536000, immutable'
  - pattern: '**/*.css'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=31536000, immutable'
  - pattern: 'assets/**/*'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=31536000, immutable'
  - pattern: '*.html'
    headers:
      - key: 'Cache-Control'
        value: 'no-cache, no-store, must-revalidate'
  - pattern: 'index.html'
    headers:
      - key: 'Cache-Control'
        value: 'no-cache, no-store, must-revalidate'
  - pattern: '**/*.png'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=604800'
  - pattern: '**/*.jpg'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=604800'
  - pattern: '**/*.jpeg'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=604800'
  - pattern: '**/*.webp'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=604800'
  - pattern: '**/*.glb'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=604800'
  - pattern: 'sitemap.xml'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=3600'
  - pattern: 'rss.xml'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=3600'
