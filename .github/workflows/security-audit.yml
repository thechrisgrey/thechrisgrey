name: Scheduled Security Audit

# The per-PR `npm audit` steps in ci.yml are informational (a hard gate flips red on
# advisory-DB drift in unchanged transitive deps). This scheduled job is the durable
# safety net: it runs npm audit against main on a schedule and opens/updates a tracked
# issue on high-severity findings, so they cannot sit unaddressed between Dependabot runs.
on:
  schedule:
    - cron: '0 12 * * 1' # Mondays 12:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: npm audit (frontend + lambdas)
        run: |
          fail=0
          echo "::group::Frontend (root)"
          npm install --no-audit --no-fund --ignore-scripts >/dev/null 2>&1 || true
          npm audit --omit=dev --audit-level=high || fail=1
          echo "::endgroup::"
          for d in lambda/*/; do
            if [ -f "${d}package.json" ]; then
              echo "::group::${d}"
              (cd "$d" && npm install --no-audit --no-fund --ignore-scripts >/dev/null 2>&1 && npm audit --omit=dev --audit-level=high) || fail=1
              echo "::endgroup::"
            fi
          done
          exit $fail

      - name: Open or update tracking issue on findings
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const url = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = 'High-severity dependency advisories detected (scheduled npm audit)';
            const body = [
              'The scheduled `npm audit` found high-severity advisories on `main`.',
              '',
              `Run log: ${url}`,
              '',
              'Remediation is tracked via Dependabot PRs (`.github/dependabot.yml`). ' +
              'Close this issue once resolved — it reopens/updates on the next run if findings persist.',
            ].join('\n');
            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'security-audit',
            });
            if (open.length) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: open[0].number, body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ['security-audit'],
              });
            }
