name: Secret Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # Uses the open-source gitleaks BINARY rather than gitleaks-action@v2, which
      # requires a paid GITLEAKS_LICENSE for organization-owned repos. The binary
      # is pinned and checksum-verified. Scans the checked-out working tree (the
      # content this PR would merge) against .gitleaks.toml.
      - name: Run gitleaks
        env:
          GITLEAKS_VERSION: '8.30.1'
        run: |
          set -euo pipefail
          base="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
          tarball="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSLf "${base}/${tarball}" -o "${tarball}"
          curl -sSLf "${base}/gitleaks_${GITLEAKS_VERSION}_checksums.txt" -o checksums.txt
          grep " ${tarball}\$" checksums.txt | sha256sum -c -
          tar -xzf "${tarball}" gitleaks
          ./gitleaks version
          ./gitleaks dir . --config .gitleaks.toml --redact --no-banner --exit-code 1
