name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run Lambda lint
        run: npm run lint:lambda

      - name: Run tests with coverage
        run: npx vitest run --coverage --reporter=verbose

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Run Lambda tests
        run: npm run test:lambda

      - name: Audit production dependencies
        run: npm audit --audit-level=high --omit=dev

      - name: Build project
        run: npm run build
        env:
          VITE_CONTACT_ENDPOINT: https://placeholder.example.com
          VITE_NEWSLETTER_ENDPOINT: https://placeholder.example.com
          VITE_CHAT_ENDPOINT: https://placeholder.example.com
          VITE_CHAT_SIGNING_KEY: ci-placeholder-key
          VITE_COGNITO_USER_POOL_ID: us-east-1_placeholder
          VITE_COGNITO_CLIENT_ID: placeholder
          VITE_KB_BUILDER_ENDPOINT: https://placeholder.example.com
          VITE_METRICS_ENDPOINT: https://placeholder.example.com

  lambda-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Audit Lambda dependencies
        run: |
          set -e
          for dir in lambda/chat-stream lambda/kb-builder lambda/metrics lambda/kb-sync; do
            echo "=== Auditing $dir ==="
            (cd "$dir" && npm install --no-audit --no-fund && npm audit --audit-level=high --omit=dev)
          done
