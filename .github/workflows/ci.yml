name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Cache Vite build
        uses: actions/cache@v4
        with:
          path: node_modules/.vite
          key: vite-cache-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            vite-cache-${{ runner.os }}-

      - name: Validate AGENTS.md consistency
        # Fails fast (no deps needed) if AGENTS.md drifts from the code:
        # documented npm scripts, file references, and Node version must all match.
        run: node scripts/validate-agents-md.mjs

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Run linter
        run: npm run lint

      - name: Run Lambda lint
        run: npm run lint:lambda

      - name: Type-check Lambda code
        run: npm run tsc:lambda

      - name: Check file sizes
        run: node scripts/check-file-sizes.mjs

      - name: Dead code analysis (knip)
        run: npx knip --reporter symbols || echo "::warning::Knip found unused code. Run 'npm run knip' locally to review."

      - name: Duplicate code detection (jscpd)
        run: npx jscpd src lambda scripts

      - name: Tech debt tracking (TODO/FIXME)
        run: node scripts/check-tech-debt.mjs

      - name: Dead feature flag detection
        run: node scripts/check-dead-feature-flags.mjs

      - name: Version drift detection (syncpack)
        run: npx syncpack lint

      - name: Generate code quality report
        run: npm run lint:quality -- --json code-quality-report.json

      - name: Upload code quality report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: code-quality-report
          path: code-quality-report.json
          retention-days: 30

      - name: Run tests with coverage
        run: npx vitest run --coverage --reporter=verbose

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: test-results/
          retention-days: 14

      - name: Install Lambda dependencies
        run: |
          set -e
          # Canonical list mirrors the lambda-audit job below — keep in sync.
          # shared installed first so file:../shared dependents resolve a fresh copy.
          # --no-workspaces: install locally in each Lambda dir, not hoisted to root.
          # --ignore-scripts: skip root prepare (husky) which is irrelevant for Lambdas.
          for dir in lambda/shared lambda/chat-stream lambda/blueprint lambda/kb-builder lambda/metrics lambda/kb-sync lambda/mcp-server lambda/session-token; do
            echo "=== Installing $dir ==="
            if [ -f "$dir/package-lock.json" ]; then
              (cd "$dir" && npm ci --no-audit --no-fund --no-workspaces --ignore-scripts)
            else
              (cd "$dir" && npm install --no-audit --no-fund --no-workspaces --ignore-scripts)
            fi
          done

      - name: Run Lambda tests
        run: npm run test:lambda

      - name: Check Lambda coverage thresholds
        run: npm run test:lambda:coverage

      - name: Upload Lambda test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lambda-test-results
          path: lambda-test-results.xml
          retention-days: 14

      - name: Audit production dependencies (informational — does not gate merges)
        # npm audit checks the live advisory DB, so a hard gate here flips CI red on
        # newly-published CVEs in transitive deps with no code change. Kept visible but
        # non-blocking; durable remediation is tracked via Dependabot (.github/dependabot.yml).
        run: npm audit --audit-level=high --omit=dev || echo "::warning::Production dependency audit found high-severity advisories (non-blocking) — see Dependabot PRs."

      - name: Build project
        run: npm run build
        env:
          VITE_CONTACT_ENDPOINT: https://placeholder.example.com
          VITE_NEWSLETTER_ENDPOINT: https://placeholder.example.com
          VITE_CHAT_ENDPOINT: https://placeholder.example.com
          VITE_CHAT_SIGNING_KEY: ci-placeholder-key
          VITE_SESSION_ENDPOINT: https://placeholder.example.com
          VITE_TURNSTILE_SITE_KEY: ci-placeholder-turnstile
          VITE_COGNITO_USER_POOL_ID: us-east-1_placeholder
          VITE_COGNITO_CLIENT_ID: placeholder
          VITE_KB_BUILDER_ENDPOINT: https://placeholder.example.com
          VITE_METRICS_ENDPOINT: https://placeholder.example.com

  cypress-mocked:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          VITE_CONTACT_ENDPOINT: https://placeholder.example.com
          VITE_NEWSLETTER_ENDPOINT: https://placeholder.example.com
          VITE_CHAT_ENDPOINT: https://placeholder.example.com
          VITE_CHAT_SIGNING_KEY: ci-placeholder-key
          VITE_SESSION_ENDPOINT: https://placeholder.example.com
          VITE_TURNSTILE_SITE_KEY: ci-placeholder-turnstile
          VITE_COGNITO_USER_POOL_ID: us-east-1_placeholder
          VITE_COGNITO_CLIENT_ID: placeholder
          VITE_KB_BUILDER_ENDPOINT: https://placeholder.example.com
          VITE_METRICS_ENDPOINT: https://placeholder.example.com

      - name: Run mock-stubbed Cypress specs
        uses: cypress-io/github-action@v7
        with:
          install: false
          start: npx vite preview --port 5173
          wait-on: 'http://localhost:5173'
          wait-on-timeout: 60
          # WebGL-dependent specs (home, navigation, mobile-navigation,
          # chat-widget) are intentionally excluded — they use no intercepts and
          # flake headless on CI. Only mock-stubbed flows run here.
          spec: >-
            cypress/e2e/404.cy.ts,
            cypress/e2e/about-pages.cy.ts,
            cypress/e2e/blog.cy.ts,
            cypress/e2e/blog-post.cy.ts,
            cypress/e2e/chat.cy.ts,
            cypress/e2e/chat-agentic.cy.ts,
            cypress/e2e/contact.cy.ts

      - name: Upload Cypress screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: cypress-screenshots
          path: cypress/screenshots/
          retention-days: 7
          if-no-files-found: ignore

  lambda-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Audit Lambda dependencies (informational — does not gate merges)
        # Install failures stay fatal (real problems); audit findings are non-blocking
        # (advisory-DB drift). Durable remediation is tracked via Dependabot.
        run: |
          set -e
          # Keep this dir list in sync with the "Install Lambda dependencies" step above.
          for dir in lambda/chat-stream lambda/blueprint lambda/kb-builder lambda/metrics lambda/kb-sync lambda/mcp-server lambda/session-token; do
            if [ ! -f "$dir/package.json" ]; then
              echo "=== Skipping $dir (no package.json) ==="
              continue
            fi
            echo "=== Auditing $dir ==="
            # --ignore-scripts: audit only needs the dependency tree, not postinstall
            # native-binary downloads (e.g. @anthropic-ai/claude-code) that fail in CI.
            (cd "$dir" && npm install --no-audit --no-fund --no-workspaces --ignore-scripts)
            (cd "$dir" && npm audit --audit-level=high --omit=dev) || echo "::warning::$dir has high-severity advisories (non-blocking) — see Dependabot PRs."
          done

  build-performance:
    # Runs the timed build in parallel with the main CI job to collect
    # per-step build timing data for performance trend analysis.
    # Non-blocking: failures here don't gate merges.
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Cache Vite build
        uses: actions/cache@v4
        with:
          path: node_modules/.vite
          key: vite-cache-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            vite-cache-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Run timed build
        run: node scripts/track-build-performance.mjs --output build-performance-report.json
        env:
          VITE_CONTACT_ENDPOINT: https://placeholder.example.com
          VITE_NEWSLETTER_ENDPOINT: https://placeholder.example.com
          VITE_CHAT_ENDPOINT: https://placeholder.example.com
          VITE_CHAT_SIGNING_KEY: ci-placeholder-key
          VITE_SESSION_ENDPOINT: https://placeholder.example.com
          VITE_TURNSTILE_SITE_KEY: ci-placeholder-turnstile
          VITE_COGNITO_USER_POOL_ID: us-east-1_placeholder
          VITE_COGNITO_CLIENT_ID: placeholder
          VITE_KB_BUILDER_ENDPOINT: https://placeholder.example.com
          VITE_METRICS_ENDPOINT: https://placeholder.example.com

      - name: Download previous build report
        uses: actions/download-artifact@v5
        with:
          name: build-performance-report
          path: previous-report
        continue-on-error: true

      - name: Compare build performance
        run: |
          PREV=""
          if [ -f previous-report/build-performance-report.json ]; then
            PREV="--previous previous-report/build-performance-report.json"
          fi
          node scripts/compare-build-performance.mjs --current build-performance-report.json $PREV --summary

      - name: Upload build performance report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-performance-report
          path: build-performance-report.json
          retention-days: 90

      # Bundle-size / heavy-dependency guard. Reuses the dist/ produced by the
      # timed build above, checks each chunk against bundle-size-budgets.json,
      # and reports gzip-size deltas vs the previous run in the job summary.
      - name: Download previous bundle-size report
        uses: actions/download-artifact@v5
        with:
          name: bundle-size-report
          path: previous-bundle
        continue-on-error: true

      - name: Report bundle size
        run: |
          PREV=""
          if [ -f previous-bundle/bundle-size-report.json ]; then
            PREV="--previous previous-bundle/bundle-size-report.json"
          fi
          node scripts/track-bundle-size.mjs --output bundle-size-report.json $PREV --summary

      - name: Upload bundle-size report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bundle-size-report
          path: bundle-size-report.json
          retention-days: 90
