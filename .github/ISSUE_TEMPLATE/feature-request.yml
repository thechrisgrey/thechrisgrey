name: Feature Request
description: Suggest a new feature or improvement
title: 'feat: '
labels: ['feature', 'needs-triage']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature. Describe the problem and the solution
        you have in mind. Check `docs/ideas-to-consider.md` first — it may
        already be listed there.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A one or two sentence description of the feature.
      placeholder: 'Add a search bar to the blog page so visitors can...'
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Affected component
      description: Which part of the system would this feature touch?
      options:
        - Frontend (React app / pages / components)
        - Alti chat (chat-stream Lambda / chat UI)
        - Blueprint generator
        - KB Admin (/admin)
        - Lambda service (kb-builder, kb-sync, metrics, mcp-server, session-token)
        - CI/CD pipeline
        - Infrastructure (AWS, Amplify, CloudFront)
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem does this solve? Who benefits?
      placeholder: "Visitors currently can't find old blog posts without scrolling..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should it work? Be as specific as you can.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider and why are they worse?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, links, or related issues.
