<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/tcg.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <!-- IMPORTANT: keep ONLY invariant, non-per-page tags in this static shell.
         Per-page title/description and ALL og:*/twitter:* title/description/image/
         url/type/card tags are emitted per route by the <SEO> component
         (react-helmet) and appear in each prerendered page's <head>. Anything
         per-page duplicated here would ALSO precede helmet's tags in the snapshot,
         and scrapers take the FIRST og:image / og:title / description — which let
         the generic shell values silently win over the real per-route ones.
         See src/components/SEO.tsx. -->
    <title>Christian Perez - thechrisgrey</title>
    <meta name="author" content="Christian Perez" />

    <!-- SEO & Crawler Directives -->
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow" />

    <!-- PWA & Mobile Optimization -->
    <meta name="theme-color" content="#0A0F1C" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Open Graph / Twitter — INVARIANT tags only (site_name, locale, card type,
         handle). Per-page og:title/description/image/url + twitter:title/
         description/image and og:image:width/height are emitted per route by <SEO>. -->
    <meta property="og:site_name" content="Christian Perez" />
    <meta property="og:locale" content="en_US" />
    <meta name="twitter:site" content="@thechrisgrey" />

    <!-- Preconnect & DNS Prefetch for Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <!-- gstatic serves the Material Icons font binary (CORS) — preconnect with crossorigin -->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdn.sanity.io" crossorigin />
    <link rel="preconnect" href="https://plausible.io" crossorigin />

    <link rel="preconnect" href="https://vrs4egsi745nep54y6abvwlcwq0smqak.lambda-url.us-east-2.on.aws" crossorigin />
    <link rel="preconnect" href="https://sf5bejshafrb6t7zbbfw5knu7a0axlyp.lambda-url.us-east-2.on.aws" crossorigin />
    <link rel="preconnect" href="https://www.buzzsprout.com" crossorigin />
    <link rel="preconnect" href="https://cognito-idp.us-east-1.amazonaws.com" crossorigin />
    <link rel="preconnect" href="https://zk46cokyuwgtdtz2ocdlhtjcji0fnidk.lambda-url.us-east-1.on.aws" crossorigin />
    <link rel="dns-prefetch" href="https://altivum.ai" />
    <link rel="dns-prefetch" href="https://vector.altivum.ai" />
    <link rel="dns-prefetch" href="https://logic.altivum.ai" />

    <!-- RSS Feed -->
    <link rel="alternate" type="application/rss+xml" title="Christian Perez - Blog" href="https://thechrisgrey.com/rss.xml" />

    <!-- Material Icons for UI elements. display=block (not swap): this is a
         ligature icon font, so swap would briefly flash the raw ligature text
         (e.g. "cloud_off") before the font loads; block keeps icons blank until
         ready. The hosting CSP allowlists fonts.googleapis.com (style-src) and
         fonts.gstatic.com (font-src) so this loads once headers are enforced. -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons&display=block" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Cloudflare Web Analytics -->
    <script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "dce081f277f9412c9cb0d916e2d76b60"}'></script>

    <!-- Plausible Analytics (privacy-friendly, no cookies) -->
    <script async src="https://plausible.io/js/pa-bQzxzh5KzDB8jWsj-fPb8.js"></script>
    <script src="/plausible-init.js"></script>
  </body>
</html>
