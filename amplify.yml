version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      # Lightweight deploy-time smoke gate. The authoritative test gate is GitHub
      # Actions CI (.github/workflows/ci.yml: full coverage threshold + lint + lambda
      # tests + audits) — protect `main` with a required status check so deploys can't
      # outrun a red CI run.
      commands:
        - npm run test
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
# Rewrite/redirect rules. KEEP IN SYNC with public/_redirects — Amplify applies
# these top-to-bottom and stops at the first match, so the order matters: serve
# real files and prerendered per-route index.html FIRST, and only let genuine
# SPA paths fall through to the root /index.html 200 shell. Without this, the
# blanket /<*> -> /index.html catch-all would shadow the prerendered
# dist/<route>/index.html files written by scripts/prerender.js and every route
# would serve homepage metadata again.
redirects:
  # 1. Real files (hashed JS/CSS, images, prerendered */index.html, .xml) win:
  #    any path with a file extension is served as-is.
  - source: '/<*>.<*>'
    target: '/<*>.<*>'
    status: '200'
  # 2. Prerendered route HTML: serve the route's OWN index.html, e.g.
  #    /blog/foo -> /blog/foo/index.html (written by scripts/prerender.js).
  - source: '/<*>'
    target: '/<*>/index.html'
    status: '200'
  # 3. SPA fallback for anything still unmatched (e.g. /admin, /blueprint, an
  #    un-prerendered deep client-only route) so React Router + NotFound work.
  - source: '/*'
    target: '/index.html'
    status: '200'
customHeaders:
  - pattern: '**/*'
    headers:
      - key: Strict-Transport-Security
        value: 'max-age=31536000; includeSubDomains'
      - key: X-Content-Type-Options
        value: 'nosniff'
      - key: X-Frame-Options
        value: 'SAMEORIGIN'
      - key: Referrer-Policy
        value: 'strict-origin-when-cross-origin'
      - key: Permissions-Policy
        value: 'camera=(), microphone=(), geolocation=()'
      - key: Content-Security-Policy
        value: "default-src 'self'; script-src 'self' https://static.cloudflareinsights.com https://plausible.io; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: https://cdn.sanity.io https://i.ytimg.com; connect-src 'self' https://cloudflareinsights.com https://plausible.io https://vrs4egsi745nep54y6abvwlcwq0smqak.lambda-url.us-east-2.on.aws https://sf5bejshafrb6t7zbbfw5knu7a0axlyp.lambda-url.us-east-2.on.aws https://mrrpf6f34n7vpkolurdc24c5fu0jruad.lambda-url.us-east-1.on.aws https://*.sanity.io https://*.apicdn.sanity.io https://zk46cokyuwgtdtz2ocdlhtjcji0fnidk.lambda-url.us-east-1.on.aws https://dnsio2ypcuxamxgzjpxr7knwpe0ybbuq.lambda-url.us-east-1.on.aws https://b6u7jlyktwv7wtseebhl45lv4y0byxnl.lambda-url.us-east-1.on.aws https://cognito-idp.us-east-1.amazonaws.com; frame-src https://www.youtube.com https://open.spotify.com https://www.buzzsprout.com; base-uri 'self'; form-action 'self'; frame-ancestors 'self'; worker-src 'none'; object-src 'none'; upgrade-insecure-requests; report-uri https://dnsio2ypcuxamxgzjpxr7knwpe0ybbuq.lambda-url.us-east-1.on.aws/csp-report"
  - pattern: '**/*.js'
    headers:
      - key: Cache-Control
        value: 'public, max-age=31536000, immutable'
  - pattern: '**/*.css'
    headers:
      - key: Cache-Control
        value: 'public, max-age=31536000, immutable'
  - pattern: 'assets/**/*'
    headers:
      - key: Cache-Control
        value: 'public, max-age=31536000, immutable'
  - pattern: '*.html'
    headers:
      - key: Cache-Control
        value: 'no-cache, no-store, must-revalidate'
  - pattern: 'index.html'
    headers:
      - key: Cache-Control
        value: 'no-cache, no-store, must-revalidate'
  - pattern: '**/*.png'
    headers:
      - key: Cache-Control
        value: 'public, max-age=604800'
  - pattern: '**/*.jpg'
    headers:
      - key: Cache-Control
        value: 'public, max-age=604800'
  - pattern: '**/*.jpeg'
    headers:
      - key: Cache-Control
        value: 'public, max-age=604800'
  - pattern: '**/*.webp'
    headers:
      - key: Cache-Control
        value: 'public, max-age=604800'
  - pattern: '**/*.glb'
    headers:
      - key: Cache-Control
        value: 'public, max-age=604800'
  - pattern: 'sitemap.xml'
    headers:
      - key: Cache-Control
        value: 'public, max-age=3600'
  - pattern: 'rss.xml'
    headers:
      - key: Cache-Control
        value: 'public, max-age=3600'
