version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Pin the build Node version. Amplify does NOT read .nvmrc (that only
        # drives CI/local via actions/setup-node); the documented way to set the
        # build runtime is `nvm use` here. AL2023 supports Node 20/22/24.
        - nvm use 22
        - npm ci
    build:
      # Lightweight deploy-time smoke gate. The authoritative test gate is GitHub
      # Actions CI (.github/workflows/ci.yml: full coverage threshold + lint + lambda
      # tests + audits) — protect `main` with a required status check so deploys can't
      # outrun a red CI run.
      commands:
        - npm run test
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
# Rewrite/redirect rules are NOT configured here. Amplify Hosting does not honor a
# top-level `redirects:` key in amplify.yml (nor a Netlify-style public/_redirects
# file) — neither is a documented buildspec key, and the live app confirms neither
# is ever applied. Rewrites/redirects are owned by the app's CustomRules, managed
# via the Amplify console (Rewrites and redirects) / the CustomRules API /
# CloudFormation AWS::Amplify::App. See:
# https://docs.aws.amazon.com/amplify/latest/userguide/redirects.html
#
# The live app has a single SPA rule (verify with
# `aws amplify get-app --app-id d3du8eg39a9peo --region us-east-2 --query app.customRules`):
#
#   source "/<*>"  target "/index.html"  status "404-200"
#
# `404-200` is a "404 rewrite": Amplify serves the requested file when it exists and
# only rewrites to /index.html when the target 404s. Combined with Amplify's native
# clean-URL resolution (a request for /blog/foo whose /blog/foo.html 404s is served
# from /blog/foo/index.html), this serves the per-route HTML written by
# scripts/prerender.js to crawlers AND falls through to the SPA shell for
# un-prerendered routes (/admin, /blueprint, /aws, /claude) and unknown paths so
# React Router's NotFound (404) page still renders. A plain `200` rewrite would NOT
# fall through on a missing target and would break those routes — do not switch it.
# To add/change a rule, edit the CustomRules in the console or via the API; editing
# this file has no effect on hosting behavior.
#
# Custom HTTP RESPONSE HEADERS are likewise NOT configured here anymore. Amplify
# Hosting deprecated the `customHeaders:` key in amplify.yml and no longer applies
# it — verified 2026-06 that production served NONE of the security or cache headers
# previously declared here (not even the cache-control rules). They now live in
# `customHttp.yml` at the repo root, which is the location Amplify actually reads.
# See customHttp.yml and:
# https://docs.aws.amazon.com/amplify/latest/userguide/migrate-custom-headers.html
